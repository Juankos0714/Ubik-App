<div class="h-[80vh] flex lg:gap-[150px] flex-col items-center justify-center px-4">
  <h1 class="text-3xl font-bold mb-6 text-center">
    REGISTRARSE COMO
  </h1>
  <div class="w-full max-w-4xl mb-8 flex flex-col md:flex-row gap-6 justify-center">
    <div class="flex-1 flex flex-col items-stretch gap-3">
      <app-button-01
        text="Propietario de Establecimiento"
        subtext="Registrarte como propietario de un establecimiento para gestionar tus moteles y habitaciones"
        [routerLink]="'/register-owner'"
        iconLeft="fas fa-home"
        iconRight="fas fa-arrow-right"
        [fullWidth]="true"
        [tall]="true"
      >
      </app-button-01>
    </div>

    <div class="flex-1 flex flex-col items-stretch gap-3">
      <app-button-01
        text="Cliente"
        subtext="Registrate como cliente para reservar habitaciones en nuestros moteles y disfrutar de una experiencia única"
        [routerLink]="'/register-user'"
        iconLeft="fas fa-user"
        iconRight="fas fa-arrow-right"
        [fullWidth]="true"
        [tall]="true"
      >
      </app-button-01>
    </div>
  </div>
</div>
