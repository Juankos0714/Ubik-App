<!-- Layout Container -->
<div class="mb-28 mt-28 flex items-center justify-center">
  <!-- Card -->
  <div
    class="w-full max-w-md bg-surface backdrop-blur-md rounded-2xl shadow-card-theme p-8 border border-subtle"
  >
    <form class="flex flex-col gap-6" (ngSubmit)="onFormSubmit()">
      <!-- Title -->
      <div class="text-center">
        <h2 class="text-2xl font-semibold text-on-bg">Iniciar Sesión</h2>
        <p class="text-muted text-sm mt-1">Ingresa tus credenciales para continuar</p>

        

        @if (hasFieldError('form')) {
          <div class="rounded-lg border border-red-500/30 bg-red-500/10 px-3 py-2 text-sm text-red-200 mt-5">
            {{ getFieldError('form') }}
          </div>
        }
          

      </div>

      <!-- Inputs -->
      <div class="flex flex-col gap-5">
        <!-- Username -->
        <div class="w-full">
          <app-input
            label="Usuario"
            placeholder="Ingresa tu usuario"
            name="username"
            [ngModel]="formData().username"
            (ngModelChange)="updateField('username', $event)"
            [disabled]="isSubmitting()"
          ></app-input>

          @if (hasFieldError('username')) {
            <p class="text-red-400 text-xs mt-1.5">
              {{ getFieldError('username') }}
            </p>
          }
        </div>

        <!-- Password -->
        <div class="w-full">
          <app-input
            label="Contraseña"
            type="password"
            placeholder="Ingresa tu contraseña"
            name="password"
            [ngModel]="formData().password"
            (ngModelChange)="updateField('password', $event)"
            [disabled]="isSubmitting()"
            [hasToggle]="true"
            [visible]="showPassword()"
            (toggle)="togglePassword()"
          ></app-input>

          @if (hasFieldError('password')) {
            <p class="text-red-400 text-xs mt-1.5">
              {{ getFieldError('password') }}
            </p>
          }
        </div>

        <!-- Remember + Forgot -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input
              type="checkbox"
              [checked]="rememberMe()"
              (change)="onRememberMeChange($event)"
              class="w-4 h-4 rounded border-gray-300 text-red-500 focus:ring-2 focus:ring-red-400 focus:ring-offset-0 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
              [disabled]="isSubmitting()"
            />
            <span class="text-on-bg-2">Recordarme</span>
          </label>

          <div class="flex flex-col items-end gap-1.5">
            <button
              type="button"
              (click)="navigateToPasswordReset()"
              class="text-red-400 hover:text-red-300 hover:underline transition-colors"
            >
              ¿Olvidaste tu contraseña?
            </button>
            <button
              type="button"
              (click)="navigateToRecoverAccount()"
              class="text-muted hover:text-on-bg transition-colors text-sm"
            >
              ¿Recuperar tu cuenta eliminada?
            </button>
          </div>
        </div>
      </div>

      <!-- Separador -->
      <div class="flex items-center gap-3">
        <div class="flex-1 border-t border-subtle"></div>
        <span class="text-xs text-muted select-none">o continúa con</span>
        <div class="flex-1 border-t border-subtle"></div>
      </div>

      <!-- Contenedor oculto para el botón de Google (renderButton) -->
      <div id="g-signin-login" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)"></div>

      <!-- Botón Google Sign-In personalizado -->
      <button
        type="button"
        (click)="triggerGoogleSignIn()"
        [disabled]="isSubmitting()"
        class="w-full flex items-center justify-center gap-3 py-2.5 px-4
               bg-input hover:bg-surface active:bg-surface
               border border-normal hover:border-subtle
               rounded-xl text-sm font-medium text-on-bg
               transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <!-- Google SVG Icon -->
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="w-full py-3 mt-2 bg-gradient-to-r from-[#6E2A35] to-[#A72027] text-white font-medium rounded-lg hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
      >
        @if (isSubmitting()) {
          <span class="flex items-center justify-center gap-2">
            <svg
              class="animate-spin h-5 w-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            Ingresando...
          </span>
        } @else {
          Ingresar
        }
      </button>
    </form>
  </div>
</div>
