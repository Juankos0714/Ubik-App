<div class="relative flex flex-col items-center justify-center min-h-screen bg-black px-6 overflow-hidden">

  <!-- Grid de fondo -->
  <div class="absolute inset-0 pointer-events-none"
       style="background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                                 linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
              background-size: 40px 40px;">
  </div>

  <!-- Glow gris/azul apagado -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[300px] pointer-events-none"
       style="background: radial-gradient(ellipse, rgba(148,163,184,0.08) 0%, transparent 70%);">
  </div>

  <!-- Badge estado -->
  <div class="relative z-10 flex items-center gap-2 mb-6
              bg-slate-400/10 border border-slate-400/25
              rounded-full px-4 py-1.5">
    <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span>
    <span class="text-slate-400 text-xs font-medium tracking-widest uppercase">
      Sin conexión
    </span>
  </div>

  <!-- Icono wifi off -->
  <div class="relative z-10 mb-6"
       style="-webkit-text-stroke: 1.5px rgba(148,163,184,0.45);">
    <svg class="w-24 h-24 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
         style="animation: flicker 6s ease-in-out infinite;">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2"
        d="M3 3l18 18M8.111 8.111A7.5 7.5 0 0 0 4.243 12 9 9 0 0 1 12 9c.88 0 1.731.12 2.54.345M19.757 12A7.5 7.5 0 0 0 12 4.5c-.88 0-1.731.12-2.54.345M10.5 10.5A3 3 0 0 1 15 15M12 20h.008v.008H12V20z"/>
    </svg>
  </div>

  <!-- Título -->
  <h1 class="relative z-10 text-white/80 font-bold text-2xl mb-3 tracking-tight">
    Sin conexión a internet
  </h1>

  <!-- Subtítulo -->
  <p class="relative z-10 text-white/40 text-sm text-center leading-relaxed mb-8"
     style="max-width: 360px;">
    No pudimos conectarnos al servidor. Revisa tu conexión a internet
    e intenta de nuevo.
  </p>

  <!-- Acciones -->
  <div class="relative z-10 flex flex-wrap gap-3 justify-center">
    <button
      (click)="retry()"
      class="px-6 py-2.5 bg-slate-600 hover:bg-slate-500 text-white
             text-sm font-semibold rounded-xl transition-all duration-200
             hover:-translate-y-0.5 active:scale-95 cursor-pointer
             flex items-center gap-2">
      <svg class="w-4 h-4" [class.animate-spin]="retrying" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      {{ retrying ? 'Verificando...' : 'Reintentar' }}
    </button>
    <button
      (click)="goHome()"
      class="px-6 py-2.5 bg-transparent hover:bg-white/5 text-white/70
             hover:text-white border border-white/15 hover:border-white/30
             text-sm font-medium rounded-xl transition-all duration-200
             hover:-translate-y-0.5 active:scale-95 cursor-pointer">
      ← Inicio
    </button>
  </div>

  <!-- Divider + hint -->
  <div class="relative z-10 mt-8 w-14 h-px bg-slate-400/20 mx-auto"></div>
  <p class="relative z-10 mt-4 text-xs text-white/20">
    Sin conexión · <span class="text-slate-400/50">Ubik App</span>
  </p>

</div>

<style>
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92%       { opacity: 1; }
    93%       { opacity: 0.3; }
    94%       { opacity: 1; }
    97%       { opacity: 0.5; }
    98%       { opacity: 1; }
  }
</style>
