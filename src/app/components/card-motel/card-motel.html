<a [routerLink]="['/motelProfile', motel.id]"
   class="group relative flex items-center justify-center cursor-pointer
          w-70 h-70 rounded-full overflow-hidden
          shadow-2xl shadow-black/60
          hover:shadow-red-900/40
          hover:scale-105
          transition-all duration-500 ease-out
          ring-2 ring-white/10 hover:ring-red-500/40">

  <!-- ══ FONDO: FOTO DE PERFIL ══ -->
  <div class="absolute inset-0">
    <img
      [src]="profileImage || coverImage"
      [alt]="motel.name"
      class="w-full h-full object-cover
             group-hover:scale-110 transition-transform duration-700 ease-out"
    />
    <!-- Overlay oscuro degradado desde abajo -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-black/10"></div>
  </div>

  <!-- ══ BADGE VERIFICADO ══ -->
  @if (motel.approvalStatus === 'APPROVED') {
    <div class="absolute top-5 left-1/2 -translate-x-1/2
                flex items-center gap-1
                bg-emerald-500/90 backdrop-blur-sm text-white
                text-[9px] font-bold px-2 py-0.5 rounded-full
                tracking-widest uppercase shadow-lg shadow-emerald-900/50
                ring-1 ring-emerald-400/30">
      <svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M16.707 5.293a1 1 0 00-1.414 0L8 12.586 4.707 9.293a1 1 0 00-1.414 1.414l4 4a1 1 0 001.414 0l8-8a1 1 0 000-1.414z"
          clip-rule="evenodd"/>
      </svg>
      Verificado
    </div>
  }

  <!-- ══ TEXTO: NOMBRE + UBICACIÓN ══ -->
  <div class="absolute bottom-0 left-0 right-0
              flex flex-col items-center text-center
              px-4 pb-10 gap-2">

    <h3 class="text-white font-bold text-lg leading-snug line-clamp-1 tracking-tight drop-shadow-lg">
      {{ motel.name }}
    </h3>

    <div class="flex items-center gap-1 text-white/70">
      <svg class="w-2.5 h-2.5 shrink-0 text-red-400" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
          clip-rule="evenodd"/>
      </svg>
      <span class="text-xs line-clamp-1 drop-shadow-md">
        {{ motel.city }}{{ motel.address ? ', ' + motel.address : '' }}
      </span>
    </div>

  </div>

</a>
