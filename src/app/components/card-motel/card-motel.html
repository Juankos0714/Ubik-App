<a [routerLink]="['/motelProfile', motel.id]"
   class="group relative flex items-center justify-center cursor-pointer
          w-60 h-45 md:w-65 md:h-50 lg:w-75 lg:h-55
          rounded-3xl overflow-hidden
          shadow-2xl   
          hover:shadow-red-900/30
          hover:scale-85
          transition-all duration-350 ease-out">

  <!-- ══ FONDO: FOTO DE PERFIL ══ -->
  <div class="absolute inset-0">
    <img
      [src]="profileImage || coverImage"
      [alt]="motel.name"
      class="w-full h-full object-cover
             group-hover:scale-110 transition-transform duration-700 ease-out"
    />
    <!-- Overlay oscuro degradado desde abajo -->
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/12 to-black/7"></div>
  </div>

  <!--
  // BADGE VERIFICADO
  @if (motel.approvalStatus === 'APPROVED') {
    <div class="absolute top-3 sm:top-4 md:top-5 left-1/2 -translate-x-1/2
                flex items-center gap-1
                bg-emerald-500/90 backdrop-blur-sm text-white
                text-[8px] sm:text-[9px] font-bold px-1.5 sm:px-2 py-0.5 rounded-full
                tracking-widest uppercase shadow-lg shadow-emerald-900/50
                ring-1 ring-emerald-400/30">
      <svg class="w-2 h-2 sm:w-2.5 sm:h-2.5" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M16.707 5.293a1 1 0 00-1.414 0L8 12.586 4.707 9.293a1 1 0 00-1.414 1.414l4 4a1 1 0 001.414 0l8-8a1 1 0 000-1.414z"
          clip-rule="evenodd"/>
      </svg>
      Verificado
    </div>
  }
  -->

  <!-- ══ TEXTO: NOMBRE + UBICACIÓN ══ -->
  <div class="absolute bottom-0 left-0 right-0
              flex flex-col items-center text-center
              px-3 sm:px-4 pb-6 sm:pb-8 md:pb-10 gap-1 sm:gap-2">

    <div class="flex items-center gap-1 text-white font-extrabold">
      <span class="text-xl  line-clamp-1 drop-shadow-md">
        {{motel.name}} <!-- {{' ' + '(' + motel.city + ')' }} -->
      </span>
    </div>

  </div>

</a>
